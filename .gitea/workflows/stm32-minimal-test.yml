name: STM32 Minimal Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  minimal-test:
    name: STM32 Minimal Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install ARM GCC
        run: |
          echo "=== Installing ARM GCC ==="
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y arm-none-eabi-gcc arm-none-eabi-binutils > /dev/null 2>&1
          echo "✓ Installed"

      - name: Verify toolchain
        run: |
          echo "=== STM32 Toolchain Verification ==="
          echo "GCC:"
          arm-none-eabi-gcc --version | head -1
          echo ""
          echo "Binutils:"
          arm-none-eabi-objdump --version | head -1
          echo ""
          echo "✓ Toolchain ready"

      - name: List project structure
        run: |
          echo "=== Project Structure ==="
          pwd
          ls -la | head -20
          echo ""
          echo "=== Core directory ==="
          [ -d Core ] && ls -la Core || echo "No Core directory"

      - name: Check for Makefile
        run: |
          echo "=== Build System Check ==="
          if [ -f Makefile ]; then
            echo "✓ Makefile found"
            echo "First 10 lines:"
            head -10 Makefile
          else
            echo "ℹ No Makefile in root"
          fi

      - name: Final status
        run: |
          echo ""
          echo "╔════════════════════════════════╗"
          echo "║  STM32 Minimal Test Complete   ║"
          echo "╚════════════════════════════════╝"
          echo "✓ Environment ready for STM32 builds"
