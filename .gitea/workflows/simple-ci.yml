# Simple CI — self-hosted Gitea (act_runner).
#
# НЕ используйте `container: false` в job: в act_runner v0.3.x это даёт образ
# `docker.io/library/false` (булево читается как имя образа). Вместо этого
# зарегистрируйте runner ТОЛЬКО с меткой (см. infra/reregister-act-runner.sh):
#   cryptowallet-host:host
# В workflow используется runs-on: cryptowallet-host — уникальная метка, чтобы Gitea
# НЕ назначала job на чужой docker-runner с ubuntu-latest:docker (checkout тогда ломается).
#
# Requirements:
# - Runner: метка cryptowallet-host:host (без docker:// для этого репозитория).
#   Перерегистрация: GITEA_RUNNER_LABELS=cryptowallet-host:host ./infra/reregister-act-runner.sh
# - Для HIL: ST-LINK, st-flash/st-info, UART на том же хосте, что и runner
#
# Внешние деревья (Makefile): stm32_secure_boot, STM32CubeH7, stm32-ssd1306 — не в этом репо.
# Checkout в act/cache даёт TOP=.../hostexecutor, поэтому ../stm32_secure_boot не существует.
# Задайте CRYPTO_DEPS_ROOT (по умолчанию /data/projects) или CI_FIRMWARE_* в env runner/Gitea.
#
# Сборка: шаг «Ensure ARM toolchain» проверяет arm-none-eabi-gcc / make и при отсутствии
# ставит только нужные пакеты (apt). CI_APT_INSTALL_ARM=false — не вызывать apt, только проверка.
# Python: см. CI_INSTALL_HOST_DEPS ниже и шаги pip/venv.

# Имя без «→»: часть раннеров/act некорректно парсит workflow при спецсимволах в name.
name: Simple CI - Build Flash Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
  workflow_dispatch:
    inputs:
      ci_build_use_rng_dump:
        description: '1 = USE_RNG_DUMP (бинарный TRNG на UART, как в push/PR). 0 = текстовые [WALLET]-маркеры, без ожидания RNG-capture.'
        type: choice
        options:
          - '1'
          - '0'
        default: '1'

# Очередь доступа к ST-LINK/UART между workflow (см. cwup-mvp-ci.yml).
concurrency:
  group: cryptowallet-stlink-${{ github.repository }}
  cancel-in-progress: false

env:
  # Python: false = только проверка импортов; true = pip/venv как в шагах ниже
  CI_INSTALL_HOST_DEPS: 'false'
  # ARM: true (по умолчанию) = если нет gcc/make — apt install только недостающих пакетов
  CI_APT_INSTALL_ARM: 'true'
  # Makefile: пути к stm32_secure_boot / STM32CubeH7 / stm32-ssd1306 (обязательно для host checkout в act cache)
  CRYPTO_DEPS_ROOT: '/data/projects'
  # HIL UART: st-flash reset выполняется ВНУТРИ uart_wait_boot_log.py ПОСЛЕ open(COM),
  # иначе теряются ранние строки [WALLET] MAIN ok / IO / NET / …
  CI_UART_BOOT_TIMEOUT_SEC: '120'
  CI_UART_ST_FLASH_RESET: '1'
  # По умолчанию USE_RNG_DUMP=1 (TRNG на UART для CI). Ручной запуск: inputs.ci_build_use_rng_dump (0 = текстовые маркеры).
  CI_BUILD_USE_RNG_DUMP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ci_build_use_rng_dump || '1' }}
  # scripts/capture_rng_uart.py: таймауты и прогресс (см. --help / CI_RNG_* в скрипте)
  CI_RNG_FIRST_BYTE_TIMEOUT_SEC: '90'
  CI_RNG_STALL_TIMEOUT_SEC: '180'
  CI_RNG_PROGRESS_INTERVAL_SEC: '5'
  CI_RNG_CAPTURE_BYTES: '1000000'
  # Минимальный размер rng_test.bin для dieharder (иначе утилита подставляет свой PRNG — не МК)
  CI_RNG_DIEHARDER_MIN_BYTES: '262144'
  # 0 = один быстрый тест (-d 0); 1 = полный dieharder -a (очень долго, лог в dieharder_full.log)
  CI_RNG_DIEHARDER_FULL: '0'
  # Пропустить долгий RNG-шаг (например прошивка без USE_RNG_DUMP=1): CI_SKIP_RNG_UART_CAPTURE=1
  CI_SKIP_RNG_UART_CAPTURE: '0'
  # Если CI_BUILD_USE_RNG_DUMP=0, шаг захвата RNG автоматически пропускается (exit 0), иначе 90s таймаут и «failure».
  # Принудительно запустить захват при несовпадении сборки (например вручную прошили RNG-сборку): CI_RNG_UART_CAPTURE_FORCE=1
  CI_RNG_UART_CAPTURE_FORCE: '0'
  # MVP: pytest tests/mvp в job build (хост, pytest+ecdsa)
  # CWUP HIL: scripts/test_cwup_mvp.py в analyse-log при CI_BUILD_USE_RNG_DUMP=0 (иначе CWUP в прошивке нет)
  CI_CWUP_STRESS_ROUNDS: '5'
  CI_CWUP_READY_TIMEOUT_SEC: '45'
  # 1 = нет порта → exit 0 (как CI_UART_SKIP_NO_DEVICE); 0 = строгий HIL при наличии /dev/ttyACM0
  CI_CWUP_SKIP_NO_DEVICE: '1'
  # Ожидаемые флаги AT+WALLET? (сборка Simple CI без USE_TEST_SEED → 0,0)
  CI_CWUP_EXPECT_WALLET_SEED: '0'
  CI_CWUP_EXPECT_CRYPTO_SIGN: '0'

# Явно bash для всех шагов `run:` (как в интерактивной shell).
defaults:
  run:
    shell: bash

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 1️⃣ BUILD - Compile firmware
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build:
    name: '1️⃣ Build Firmware'
    runs-on: cryptowallet-host
    env:
      # Дублируем на уровне job: на некоторых версиях Gitea глобальный env не попадает в make
      CRYPTO_DEPS_ROOT: '/data/projects'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Ensure ARM toolchain (check + apt only if missing)
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          echo "=== Текущее состояние ==="
          command -v arm-none-eabi-gcc >/dev/null && arm-none-eabi-gcc --version | head -1 || echo "  arm-none-eabi-gcc: нет"
          command -v arm-none-eabi-objcopy >/dev/null && echo "  arm-none-eabi-objcopy: ok" || echo "  arm-none-eabi-objcopy: нет"
          command -v make >/dev/null && make --version | head -1 || echo "  make: нет"

          need=()
          command -v arm-none-eabi-gcc >/dev/null || need+=(gcc-arm-none-eabi binutils-arm-none-eabi)
          command -v make >/dev/null || need+=(make)

          if [ "${#need[@]}" -eq 0 ]; then
            echo "✓ Тулчейн и make уже установлены, apt не нужен."
            exit 0
          fi

          echo "=== Не хватает пакетов: ${need[*]} ==="

          if [ "${CI_APT_INSTALL_ARM:-true}" != "true" ]; then
            echo "Установите вручную: sudo apt install -y ${need[*]}"
            echo "Или выставьте CI_APT_INSTALL_ARM=true в workflow."
            exit 1
          fi

          echo "=== apt install (только недостающее) ==="
          if [ "$(id -u)" -eq 0 ]; then
            apt-get update -qq
            apt-get install -y --no-install-recommends "${need[@]}"
          else
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends "${need[@]}"
          fi

          command -v arm-none-eabi-gcc >/dev/null
          command -v make >/dev/null
          echo "✓ После установки:"
          arm-none-eabi-gcc --version | head -1
          make --version | head -1

      - name: Verify firmware dependency trees (host runner)
        run: |
          set -euo pipefail
          DEPS_ROOT="${CRYPTO_DEPS_ROOT:-/data/projects}"
          export SECURE_BOOT="${CI_FIRMWARE_SECURE_BOOT:-${DEPS_ROOT}/stm32_secure_boot}"
          export CUBE_ROOT="${CI_FIRMWARE_CUBE_ROOT:-${DEPS_ROOT}/STM32CubeH7}"
          export SSD1306="${CI_FIRMWARE_SSD1306:-${DEPS_ROOT}/stm32-ssd1306}"
          echo "SECURE_BOOT=$SECURE_BOOT"
          echo "CUBE_ROOT=$CUBE_ROOT"
          echo "SSD1306=$SSD1306"
          for d in "$SECURE_BOOT" "$CUBE_ROOT" "$SSD1306"; do
            if [ ! -d "$d" ]; then
              echo "::error::Firmware dependency directory missing: $d"
              echo "Set CRYPTO_DEPS_ROOT or CI_FIRMWARE_SECURE_BOOT / CI_FIRMWARE_CUBE_ROOT / CI_FIRMWARE_SSD1306 on the runner."
              exit 1
            fi
          done
          echo "✓ Dependency trees present."

      - name: Build firmware
        run: |
          set -euo pipefail
          echo "🔨 Building firmware..."
          export CRYPTO_DEPS_ROOT="${CRYPTO_DEPS_ROOT:-/data/projects}"
          # Опциональные переопределения (редко нужны)
          [ -n "${CI_FIRMWARE_SECURE_BOOT:-}" ] && export SECURE_BOOT="$CI_FIRMWARE_SECURE_BOOT"
          [ -n "${CI_FIRMWARE_CUBE_ROOT:-}" ] && export CUBE_ROOT="$CI_FIRMWARE_CUBE_ROOT"
          [ -n "${CI_FIRMWARE_SSD1306:-}" ] && export SSD1306="$CI_FIRMWARE_SSD1306"
          echo "CRYPTO_DEPS_ROOT=$CRYPTO_DEPS_ROOT (Makefile uses this for SECURE_BOOT/CUBE_ROOT/SSD1306)"
          make clean
          # CI_BUILD_USE_RNG_DUMP: 1 = бинарный TRNG на UART (дефолт CI); 0 = текстовые маркеры
          RNG="${CI_BUILD_USE_RNG_DUMP:-1}"
          echo "🔧 USE_RNG_DUMP=$RNG USE_WEBUSB=1 (default: WebUSB on; CWUP on UART when RNG=0)"
          make "USE_RNG_DUMP=$RNG" USE_WEBUSB=1 -j"$(nproc)"
          echo ""
          echo "✅ Build complete:"
          ls -lh build/cryptowallet.bin build/cryptowallet.elf

      - name: MVP host tests (pytest tests/mvp)
        run: |
          set -euo pipefail
          echo "🧪 MVP host tests: CRC, CWUP parsing, secure_boot image tamper (ecdsa)"
          python3 -m venv .venv-ci-mvp
          .venv-ci-mvp/bin/pip install -q -U pip
          .venv-ci-mvp/bin/pip install -q pytest "ecdsa>=0.18,<1"
          export STM32_SECURE_BOOT="${CI_FIRMWARE_SECURE_BOOT:-${CRYPTO_DEPS_ROOT:-/data/projects}/stm32_secure_boot}"
          echo "STM32_SECURE_BOOT=$STM32_SECURE_BOOT (for test_secure_boot_sign_tamper if key present)"
          .venv-ci-mvp/bin/python -m pytest tests/mvp -q --tb=short
          echo "✅ MVP pytest OK"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: firmware-build
          path: |
            build/cryptowallet.bin
            build/cryptowallet.elf
          retention-days: 7

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 2️⃣ FLASH - Flash to device + RESET
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  flash:
    name: '2️⃣ Flash & Reset Device'
    runs-on: cryptowallet-host
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download firmware
        uses: actions/download-artifact@v3
        with:
          name: firmware-build
          path: build/

      - name: Install st-link tools
        run: |
          which st-flash || { echo "st-flash already installed"; }

      - name: Flash firmware to STM32H743ZI2
        run: |
          echo "📤 Flashing firmware..."
          st-flash --reset write build/cryptowallet.bin 0x08000000 || \
          { echo "⚠️ Flash failed (device may not be connected)"; exit 0; }
          echo "✅ Flash + Reset complete"

      - name: Wait for device stabilization
        run: |
          echo "⏳ Waiting 2 seconds for device boot..."
          sleep 2
          echo "✓ Device should be ready"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 3️⃣ ANALYSE LOG - Read UART output after reset
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  analyse-log:
    name: '3️⃣ Analyse UART Log'
    runs-on: cryptowallet-host
    needs: flash
    if: always()
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download firmware (CWUP --bin vs build/cryptowallet.bin)
        uses: actions/download-artifact@v3
        with:
          name: firmware-build
          path: build/

      - name: Setup Python (pyserial — без PEP 668 pip на системный Python)
        run: |
          set -euo pipefail
          if python3 -c "import serial" 2>/dev/null; then
            echo "✓ python3-serial / pyserial already importable"
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            if [ "$(id -u)" -eq 0 ]; then
              apt-get update -qq
              apt-get install -y --no-install-recommends python3-serial
            else
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends python3-serial
            fi
          else
            python3 -m venv .venv-ci-uart
            .venv-ci-uart/bin/pip install -q pyserial
            echo "PY_UART=$(pwd)/.venv-ci-uart/bin/python3" >> "$GITHUB_ENV"
          fi
          python3 -c "import serial; print('✓ pyserial OK')"

      - name: Wait for boot log markers (UART)
        run: |
          set -euo pipefail
          touch uart_boot_status.txt uart_output.log
          if [ "${CI_BUILD_USE_RNG_DUMP:-1}" = "1" ]; then
            echo "⏭️  USE_RNG_DUMP=1: UART — бинарный поток TRNG; текстовые маркеры [WALLET] не ожидаются (см. docs_src/CI_PIPELINE_ru.md)."
            echo "skipped: rng_dump_mode CI_BUILD_USE_RNG_DUMP=1" > uart_boot_status.txt
            echo "(UART binary TRNG stream — no text boot log)" > uart_output.log
            exit 0
          fi
          PY="${PY_UART:-python3}"
          echo "📡 UART: all service markers from scripts/ci/uart_boot_markers.txt (order irrelevant)"
          echo "   Timeout: ${CI_UART_BOOT_TIMEOUT_SEC:-120}s  port: ${CI_UART_PORT:-/dev/ttyACM0}"
          echo "   (st-flash reset runs inside Python after open(serial) — full boot log)"
          set +e
          "$PY" scripts/ci/uart_wait_boot_log.py \
            --markers-file scripts/ci/uart_boot_markers.txt \
            --timeout "${CI_UART_BOOT_TIMEOUT_SEC:-120}"
          uart_rc=$?
          set -e
          if [ "$uart_rc" -ne 0 ]; then
            echo ""
            echo "========== UART step failed (exit $uart_rc) — plain-text dump for CI UI =========="
            echo "--- uart_boot_status.txt ---"
            cat uart_boot_status.txt 2>/dev/null || true
            echo "--- uart_output.log (last 120 lines) ---"
            tail -n 120 uart_output.log 2>/dev/null || true
            echo "--- uart_output.log size ---"
            wc -l uart_output.log 2>/dev/null || true
            wc -c uart_output.log 2>/dev/null || true
            echo "==================================================================================="
            exit "$uart_rc"
          fi

      - name: MVP CWUP HIL (UART, only when USE_RNG_DUMP=0)
        run: |
          set -euo pipefail
          if [ "${CI_BUILD_USE_RNG_DUMP:-1}" = "1" ]; then
            echo "⏭️  USE_RNG_DUMP=1: CWUP task not active — skip scripts/test_cwup_mvp.py (see cwup_uart.c / UART_PROTOCOL_MVP)"
            exit 0
          fi
          if [ ! -f build/cryptowallet.bin ]; then
            echo "::warning::build/cryptowallet.bin missing — skip CWUP HIL"
            exit 0
          fi
          echo "📡 MVP CWUP HIL: WALLET/SELFTEST/ECHO + PING… FWINFO+CRC / BOOTCHAIN + stress"
          python3 -m venv .venv-ci-cwup
          .venv-ci-cwup/bin/pip install -q -U pip pyserial
          PY="$(pwd)/.venv-ci-cwup/bin/python3"
          export CWUP_SKIP_NO_DEVICE="${CI_CWUP_SKIP_NO_DEVICE:-1}"
          export CWUP_UART_PORT="${CI_UART_PORT:-/dev/ttyACM0}"
          export CWUP_EXPECT_WALLET_SEED="${CI_CWUP_EXPECT_WALLET_SEED:-0}"
          export CWUP_EXPECT_CRYPTO_SIGN="${CI_CWUP_EXPECT_CRYPTO_SIGN:-0}"
          "$PY" scripts/test_cwup_mvp.py \
            --port "${CWUP_UART_PORT}" \
            --bin build/cryptowallet.bin \
            --stress-extra-rounds "${CI_CWUP_STRESS_ROUNDS:-5}" \
            --ready-timeout "${CI_CWUP_READY_TIMEOUT_SEC:-45}"
          echo "✅ CWUP HIL OK"

      - name: Display log analysis
        if: always()
        run: |
          if [ -f uart_boot_status.txt ]; then
            echo "=== Boot marker status ==="
            cat uart_boot_status.txt
            echo ""
          fi
          if [ -f uart_output.log ]; then
            echo "=== UART Output ==="
            bytes=$(wc -c < uart_output.log | tr -d ' ')
            if [ "${bytes:-0}" -gt 200000 ]; then
              echo "(large log: ${bytes} bytes — head+tail only; full file in artifact uart-logs)"
              head -n 40 uart_output.log
              echo "..."
              tail -n 120 uart_output.log
            else
              cat uart_output.log
            fi
            echo ""
            echo "=== Analysis ==="
            echo "Lines: $(wc -l < uart_output.log)"
            echo "Bytes: $(wc -c < uart_output.log)"
            if grep -q "error\|Error\|ERROR" uart_output.log; then
              echo "⚠️  Error messages detected!"
            else
              echo "✓ No obvious errors"
            fi
          else
            echo "⚠️ No UART log available"
          fi

      - name: Upload UART log
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: uart-logs
          path: |
            uart_output.log
            uart_boot_status.txt
          retention-days: 7

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 4️⃣ QUICK TEST - Preliminary functionality check
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  quick-test:
    name: '4️⃣ Quick Preliminary Test'
    # Список для совместимости с частью парсеров act/Gitea ('runs-on' not defined)
    runs-on: [cryptowallet-host]
    needs: analyse-log
    if: always()
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python (pip)
        if: ${{ env.CI_INSTALL_HOST_DEPS == 'true' }}
        run: |
          python3 -m pip install -q pyserial requests || echo "Dependencies ready"

      - name: Verify Python deps on host
        if: ${{ env.CI_INSTALL_HOST_DEPS != 'true' }}
        run: |
          python3 -c "import serial, requests" || { echo "pip install --user pyserial requests или CI_INSTALL_HOST_DEPS=true"; exit 1; }

      - name: Device connectivity check
        run: |
          echo "🔍 Device connectivity check:"
          echo ""
          
          echo "UART devices:"
          ls -la /dev/ttyACM* 2>/dev/null && echo "✓ UART available" || echo "⚠️ No UART devices"
          
          echo ""
          echo "USB devices:"
          lsusb | grep -i stm && echo "✓ STM32 found" || echo "⚠️ No STM32 in USB"
          
          echo ""
          echo "ST-LINK / probe:"
          (command -v st-info >/dev/null && st-info --probe) || \
          (st-flash --version 2>&1 | head -3) || \
          echo "⚠️ st-info/st-flash not found or no probe"

      - name: Firmware size check
        run: |
          echo "📦 Checking ST-LINK / target (if tools present):"
          if command -v st-info >/dev/null 2>&1; then
            st-info --probe || echo "⚠️ st-info probe failed"
          else
            echo "⚠️ st-info not installed on host"
          fi

      - name: Basic UART ping test (if available)
        run: |
          echo "📡 Basic UART test (5 second ping):"
          python3 << 'PYTHON_EOF'
          import serial
          import time
          import os
          
          if not os.path.exists("/dev/ttyACM0"):
              print("⚠️ No UART device - skipping")
              exit(0)
          
          try:
              ser = serial.Serial("/dev/ttyACM0", baudrate=115200, timeout=1)
              time.sleep(0.5)
              
              # Listen for any activity
              data_received = b""
              timeout = time.time() + 5
              
              while time.time() < timeout:
                  if ser.in_waiting > 0:
                      chunk = ser.read(1024)
                      data_received += chunk
                      print(f"  Received {len(chunk)} bytes")
              
              ser.close()
              
              if len(data_received) > 0:
                  print(f"✓ Device transmitting: {len(data_received)} total bytes")
              else:
                  print("⚠️ No data received from device")
                  
          except Exception as e:
              print(f"✗ UART test error: {e}")
          PYTHON_EOF

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 5️⃣ HARDWARE TEST - Full firmware test (RNG, Signing)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  hardware-test:
    name: '5️⃣ Hardware Firmware Test'
    runs-on: cryptowallet-host
    needs: quick-test
    if: always()
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python environment (venv + pip)
        if: ${{ env.CI_INSTALL_HOST_DEPS == 'true' }}
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -q -r requirements-test.txt
          echo "PY=$(pwd)/.venv/bin/python3" >> "$GITHUB_ENV"
          echo "✓ Python venv ready"

      - name: Use system Python (host deps)
        if: ${{ env.CI_INSTALL_HOST_DEPS != 'true' }}
        run: |
          python3 -c "import serial, requests" || { echo "На хосте: pip install --user -r requirements-test.txt или CI_INSTALL_HOST_DEPS=true"; exit 1; }
          echo "PY=python3" >> "$GITHUB_ENV"
          echo "✓ Using system python3"

      - name: RNG UART capture test
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "═══════════════════════════════════════════════════════════════════"
          echo "🧪 RNG UART capture (scripts/capture_rng_uart.py)"
          echo "   Прошивка: USE_RNG_DUMP=${CI_BUILD_USE_RNG_DUMP:-1} (1 = бинарный TRNG на UART)."
          echo "   Пропуск capture: CI_SKIP_RNG_UART_CAPTURE=1 или CI_BUILD_USE_RNG_DUMP≠1 (без CI_RNG_UART_CAPTURE_FORCE=1)."
          echo "   Док: docs_src/CI_PIPELINE_ru.md"
          echo "═══════════════════════════════════════════════════════════════════"
          if [ "${CI_SKIP_RNG_UART_CAPTURE:-0}" = "1" ]; then
            echo "⏭️  CI_SKIP_RNG_UART_CAPTURE=1 — пропуск захвата RNG"
            : > rng_test.bin
            ls -la rng_test.bin
            exit 0
          fi
          if [ "${CI_BUILD_USE_RNG_DUMP:-0}" != "1" ] && [ "${CI_RNG_UART_CAPTURE_FORCE:-0}" != "1" ]; then
            echo "⏭️  Пропуск RNG capture: CI_BUILD_USE_RNG_DUMP≠1 (ожидаемо для сборки с текстовыми логами на UART)."
            echo "    Чтобы тестировать бинарный поток: CI_BUILD_USE_RNG_DUMP=1 + прошивка с USE_RNG_DUMP=1."
            : > rng_test.bin
            ls -la rng_test.bin
            exit 0
          fi
          cap_rc=1
          set +e
          ${PY:-python3} scripts/capture_rng_uart.py \
            --port "${CI_UART_PORT:-/dev/ttyACM0}" \
            --out rng_test.bin \
            --bytes "${CI_RNG_CAPTURE_BYTES:-1000000}" \
            --first-byte-timeout "${CI_RNG_FIRST_BYTE_TIMEOUT_SEC:-90}" \
            --stall-timeout "${CI_RNG_STALL_TIMEOUT_SEC:-180}" \
            --progress-interval "${CI_RNG_PROGRESS_INTERVAL_SEC:-5}" \
            2>&1
          cap_rc=$?
          set -e
          if [ -f rng_test.bin ]; then
            SIZE=$(stat -f%z rng_test.bin 2>/dev/null || stat -c%s rng_test.bin)
            echo "📦 rng_test.bin size: $SIZE bytes (exit code from capture: $cap_rc)"
            if [ "$SIZE" -eq 0 ] || [ "$cap_rc" -ne 0 ]; then
              echo "⚠️ RNG capture incomplete or failed (см. лог выше; для полного захвата нужна прошивка USE_RNG_DUMP=1)"
            fi
          else
            echo "⚠️ rng_test.bin не создан — ошибка до открытия порта"
          fi
          exit "$cap_rc"

      - name: Quick DIEHARDER validation (if data available)
        continue-on-error: true
        run: |
          set -euo pipefail
          MIN="${CI_RNG_DIEHARDER_MIN_BYTES:-262144}"
          if [ ! -f rng_test.bin ]; then
            echo "⚠️ Skipping DIEHARDER (нет rng_test.bin)"
            echo "skipped: no rng_test.bin" > dieharder_snippet.log
            exit 0
          fi
          SIZE=$(stat -f%z rng_test.bin 2>/dev/null || stat -c%s rng_test.bin)
          if [ "$SIZE" -lt "$MIN" ]; then
            echo "⚠️ Skipping DIEHARDER: rng_test.bin слишком мал ($SIZE байт, нужно ≥ $MIN)."
            echo "При пустом/коротком файле dieharder подставляет свой генератор (не данные с МК)."
            echo "skipped: size $SIZE < min $MIN (нужна прошивка USE_RNG_DUMP=1 и успешный RNG capture)" > dieharder_snippet.log
            exit 0
          fi
          if ! command -v dieharder >/dev/null 2>&1; then
            echo "⚠️ dieharder не в PATH (sudo apt install dieharder)"
            echo "skipped: dieharder not installed" > dieharder_snippet.log
            exit 0
          fi
          echo "📊 DIEHARDER on $SIZE bytes (min $MIN)..."
          set +e
          if [ "${CI_RNG_DIEHARDER_FULL:-0}" = "1" ]; then
            echo "   (режим FULL -a — может занять десятки минут)"
            dieharder -a -g 201 -f rng_test.bin > dieharder_full.log 2>&1
            dh_rc=$?
            head -120 dieharder_full.log | tee dieharder_snippet.log
            echo "dieharder exit code: $dh_rc (см. dieharder_full.log)"
          else
            echo "   (быстрый smoke: -d 0 -g 201 -f …; полный -a: CI_RNG_DIEHARDER_FULL=1)"
            dieharder -d 0 -g 201 -f rng_test.bin > dieharder_snippet.log 2>&1
            dh_rc=$?
            cat dieharder_snippet.log
            echo "dieharder exit code: $dh_rc"
          fi
          set -e
          exit 0

      - name: Firmware functionality test
        continue-on-error: true
        run: |
          echo "🔐 Testing firmware functionality..."
          
          # Run comprehensive test if available
          if [ -f "scripts/test_rng_signing_comprehensive.py" ]; then
            ${PY:-python3} scripts/test_rng_signing_comprehensive.py \
              --mode signing 2>&1 | head -30 || \
            echo "⚠️ Functionality test incomplete (expected in offline CI)"
          else
            echo "⚠️ Test script not found"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: hardware-test-results
          path: |
            rng_test.bin
            dieharder_snippet.log
          retention-days: 7

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # REPORT - Final summary
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  report:
    name: '📋 CI Pipeline Report'
    runs-on: cryptowallet-host
    needs: [ build, flash, analyse-log, quick-test, hardware-test ]
    if: always()
    steps:
      - name: Generate report
        run: |
          cat > pipeline_report.txt << 'REPORT'
          ╔════════════════════════════════════════════════════════════╗
          ║          CryptoWallet Simple CI Pipeline Report            ║
          ╚════════════════════════════════════════════════════════════╝
          
          Pipeline Stages:
          ─────────────────
          
          1️⃣  BUILD
              Status: ${{ needs.build.result }}
              Task: Compile firmware using ARM GCC toolchain; MVP pytest (tests/mvp — host CRC/CWUP parse/secure_boot tamper)
              Output: cryptowallet.bin, cryptowallet.elf
          
          2️⃣  FLASH & RESET
              Status: ${{ needs.flash.result }}
              Task: Flash firmware to STM32H743ZI2 via ST-LINK
              Device: STM32H743ZI2 (Nucleo-144)
              Flash Address: 0x08000000
          
          3️⃣  ANALYSE LOG
              Status: ${{ needs.analyse-log.result }}
              Task: Text boot markers OR skip if USE_RNG_DUMP=1 (binary TRNG UART); MVP CWUP HIL if USE_RNG_DUMP=0 (test_cwup_mvp.py)
              Port: /dev/ttyACM0 @ 115200 baud
          
          4️⃣  QUICK TEST
              Status: ${{ needs.quick-test.result }}
              Task: Preliminary device connectivity check
              Checks: UART, USB, ST-LINK detection
              Duration: ~5 seconds
          
          5️⃣  HARDWARE TEST
              Status: ${{ needs.hardware-test.result }}
              Task: Full firmware functionality test
              Tests: RNG capture, DIEHARDER, Signing
              Duration: Up to 30 minutes
          
          ╔════════════════════════════════════════════════════════════╗
          ║                    Summary Status                          ║
          ╚════════════════════════════════════════════════════════════╝
          
          Build:        ${{ needs.build.result }}       ✓
          Flash:        ${{ needs.flash.result }}       ⚠️ (device dependent)
          Analysis:     ${{ needs.analyse-log.result }}  ⚠️ (device dependent)
          Quick Test:   ${{ needs.quick-test.result }}   ⚠️ (device dependent)
          Hardware:     ${{ needs.hardware-test.result }}  ⚠️ (device dependent)
          
          ✓ = Success
          ⚠️ = Device offline (expected in CI without hardware)
          
          Notes:
          ──────
          - Stages 2-5 require STM32H743ZI2 device + ST-LINK debugger
          - Stage 1 (Build) always works in CI environment
          - UART tests require /dev/ttyACM0 to be available
          - Default build: USE_RNG_DUMP=1 (TRNG on UART); marker step skipped when binary UART
          
          Next Steps:
          ───────────
          1. Check build artifacts in Actions
          2. If device connected: verify UART logs
          3. For full tests: ensure device is powered and connected
          4. Review individual job logs for details
          
          Artifacts:
          ──────────
          - firmware-build/cryptowallet.{bin,elf}
          - uart-logs/uart_output.log
          - hardware-test-results/rng_test.bin, dieharder_snippet.log
          REPORT
          
          cat pipeline_report.txt

      - name: Upload report
        uses: actions/upload-artifact@v3
        with:
          name: pipeline-report
          path: pipeline_report.txt
          retention-days: 30
