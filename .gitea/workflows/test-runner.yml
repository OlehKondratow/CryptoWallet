name: Test Runner

on:
  push:
    branches: [ main, develop ]
  pull_request:
  workflow_dispatch:

jobs:
  test-basic:
    name: Basic Runner Test
    runs-on: linux/amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: System Info
        run: |
          echo "=== System Information ==="
          uname -a
          echo ""
          echo "=== CPU Info ==="
          nproc
          echo ""
          echo "=== Memory ==="
          free -h
          echo ""
          echo "=== Disk Space ==="
          df -h

      - name: Test Tools
        run: |
          echo "=== Checking Available Tools ==="
          echo ""
          echo "✓ Bash:"
          bash --version | head -1
          echo ""
          echo "✓ Git:"
          git --version
          echo ""
          echo "✓ Python3:"
          python3 --version || echo "Not installed"
          echo ""
          echo "✓ ARM GCC (if available):"
          arm-none-eabi-gcc --version 2>/dev/null | head -1 || echo "Not installed"
          echo ""
          echo "✓ Make:"
          make --version | head -1

      - name: Test Python
        run: |
          python3 << 'EOF'
          import sys
          print(f"Python {sys.version}")
          print(f"Platform: {sys.platform}")
          print("✓ Python execution works!")
          EOF

      - name: Verify Repository
        run: |
          echo "=== Repository Info ==="
          pwd
          ls -la
          echo ""
          echo "=== Git Status ==="
          git status
          echo ""
          echo "=== Commit Info ==="
          git log -1 --oneline

      - name: Test Artifact Upload
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-runner-log
          path: |
            .gitignore
          retention-days: 7

  test-shell:
    name: Shell Commands Test
    runs-on: linux/amd64
    needs: test-basic
    steps:
      - name: Test environment variables
        run: |
          echo "=== Environment Test ==="
          echo "USER: $USER"
          echo "HOME: $HOME"
          echo "PWD: $PWD"
          echo "PATH: $PATH"

      - name: Test file operations
        run: |
          echo "=== File Operations Test ==="
          mkdir -p /tmp/test_runner
          cd /tmp/test_runner
          echo "test content" > test.txt
          cat test.txt
          rm -rf /tmp/test_runner
          echo "✓ File operations work!"

      - name: Test loops and conditions
        run: |
          echo "=== Logic Test ==="
          for i in {1..3}; do
            echo "Loop iteration: $i"
          done
          
          if [ -d "/tmp" ]; then
            echo "✓ /tmp directory exists"
          fi

  summary:
    name: Test Summary
    runs-on: linux/amd64
    needs: [ test-basic, test-shell ]
    if: always()
    steps:
      - name: Test Complete
        run: |
          echo "╔════════════════════════════════════╗"
          echo "║  ✓ RUNNER TEST COMPLETED           ║"
          echo "╚════════════════════════════════════╝"
          echo ""
          echo "✓ Basic system checks passed"
          echo "✓ Tool availability verified"
          echo "✓ Python execution confirmed"
          echo "✓ Repository access working"
          echo "✓ Shell operations functional"
          echo ""
          echo "Ready for main pipeline!"
