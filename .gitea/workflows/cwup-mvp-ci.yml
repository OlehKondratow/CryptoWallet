# CWUP MVP — автоматическая проверка AT-команд на UART (отдельно от Simple CI).
#
# Simple CI по умолчанию собирает USE_RNG_DUMP=1 → на UART нет CWUP. Этот workflow
# всегда собирает USE_RNG_DUMP=0, прошивает плату и запускает scripts/test_cwup_mvp.py.
#
# Требования: runner cryptowallet-host:host, ST-LINK, /dev/ttyACM0, деревья из CRYPTO_DEPS_ROOT.
#
# Очередь с другими workflow: см. concurrency (общий group для serial доступа к ST-LINK).
#
name: CWUP MVP - AT commands HIL

on:
  push:
    branches: [ main, develop ]
  pull_request:
  workflow_dispatch:
  schedule:
    # Ежедневно 04:15 UTC — ночная проверка CWUP на стенде (отключите, удалив блок schedule)
    - cron: '15 4 * * *'

concurrency:
  group: cryptowallet-stlink-${{ github.repository }}
  cancel-in-progress: false

env:
  CI_APT_INSTALL_ARM: 'true'
  CRYPTO_DEPS_ROOT: '/data/projects'
  CI_CWUP_STRESS_ROUNDS: '10'
  CI_CWUP_READY_TIMEOUT_SEC: '60'
  CI_CWUP_SKIP_NO_DEVICE: '1'
  CI_UART_PORT: '/dev/ttyACM0'
  CI_CWUP_EXPECT_WALLET_SEED: '1'
  CI_CWUP_EXPECT_CRYPTO_SIGN: '1'

defaults:
  run:
    shell: bash

jobs:
  cwup-build:
    name: Build USE_RNG_DUMP=0 + pytest tests/mvp
    runs-on: cryptowallet-host
    env:
      CRYPTO_DEPS_ROOT: '/data/projects'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Ensure ARM toolchain (check + apt only if missing)
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          need=()
          command -v arm-none-eabi-gcc >/dev/null || need+=(gcc-arm-none-eabi binutils-arm-none-eabi)
          command -v make >/dev/null || need+=(make)
          if [ "${#need[@]}" -eq 0 ]; then
            echo "✓ ARM toolchain + make OK"
            exit 0
          fi
          if [ "${CI_APT_INSTALL_ARM:-true}" != "true" ]; then
            echo "::error::Install: ${need[*]}"
            exit 1
          fi
          if [ "$(id -u)" -eq 0 ]; then
            apt-get update -qq
            apt-get install -y --no-install-recommends "${need[@]}"
          else
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends "${need[@]}"
          fi
          command -v arm-none-eabi-gcc >/dev/null
          command -v make >/dev/null

      - name: Verify firmware dependency trees
        run: |
          set -euo pipefail
          DEPS_ROOT="${CRYPTO_DEPS_ROOT:-/data/projects}"
          export SECURE_BOOT="${CI_FIRMWARE_SECURE_BOOT:-${DEPS_ROOT}/stm32_secure_boot}"
          export CUBE_ROOT="${CI_FIRMWARE_CUBE_ROOT:-${DEPS_ROOT}/STM32CubeH7}"
          export SSD1306="${CI_FIRMWARE_SSD1306:-${DEPS_ROOT}/stm32-ssd1306}"
          for d in "$SECURE_BOOT" "$CUBE_ROOT" "$SSD1306"; do
            if [ ! -d "$d" ]; then
              echo "::error::Missing dependency dir: $d"
              exit 1
            fi
          done
          echo "✓ Deps OK"

      - name: Build firmware (USE_RNG_DUMP=0 — CWUP on USART3)
        run: |
          set -euo pipefail
          export CRYPTO_DEPS_ROOT="${CRYPTO_DEPS_ROOT:-/data/projects}"
          [ -n "${CI_FIRMWARE_SECURE_BOOT:-}" ] && export SECURE_BOOT="$CI_FIRMWARE_SECURE_BOOT"
          [ -n "${CI_FIRMWARE_CUBE_ROOT:-}" ] && export CUBE_ROOT="$CI_FIRMWARE_CUBE_ROOT"
          [ -n "${CI_FIRMWARE_SSD1306:-}" ] && export SSD1306="$CI_FIRMWARE_SSD1306"
          make clean
          echo "🔧 USE_RNG_DUMP=0 USE_WEBUSB=1 USE_TEST_SEED=1 (CWUP + WebUSB + lab seed for AT+WALLET?)"
          make USE_RNG_DUMP=0 USE_WEBUSB=1 USE_TEST_SEED=1 -j"$(nproc)"
          ls -lh build/cryptowallet.bin build/cryptowallet.elf

      - name: MVP host tests (pytest)
        run: |
          set -euo pipefail
          python3 -m venv .venv-ci-mvp
          .venv-ci-mvp/bin/pip install -q -U pip
          .venv-ci-mvp/bin/pip install -q pytest "ecdsa>=0.18,<1"
          export STM32_SECURE_BOOT="${CI_FIRMWARE_SECURE_BOOT:-${CRYPTO_DEPS_ROOT:-/data/projects}/stm32_secure_boot}"
          .venv-ci-mvp/bin/python -m pytest tests/mvp -q --tb=short

      - name: Upload CWUP firmware artifact
        uses: actions/upload-artifact@v3
        with:
          name: firmware-cwup-mvp
          path: |
            build/cryptowallet.bin
            build/cryptowallet.elf
          retention-days: 7

  cwup-hil-at:
    name: Flash + test_cwup_mvp.py (AT+PING, FWINFO, BOOTCHAIN, stress)
    runs-on: cryptowallet-host
    needs: cwup-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download CWUP firmware
        uses: actions/download-artifact@v3
        with:
          name: firmware-cwup-mvp
          path: build/

      - name: Flash STM32 (CWUP build)
        run: |
          set -euo pipefail
          if [ ! -f build/cryptowallet.bin ]; then
            echo "::error::build/cryptowallet.bin missing"
            exit 1
          fi
          echo "📤 Flash CWUP firmware (USE_RNG_DUMP=0) -> 0x08000000"
          st-flash --reset write build/cryptowallet.bin 0x08000000 || \
            { echo "::warning::st-flash failed (no ST-LINK?)"; exit 0; }
          sleep 2
          echo "✅ Flash done"

      - name: Run CWUP AT smoke + stress (UART)
        run: |
          set -euo pipefail
          python3 -m venv .venv-cwup-hil
          .venv-cwup-hil/bin/pip install -q -U pip pyserial
          PY="$(pwd)/.venv-cwup-hil/bin/python3"
          export CWUP_SKIP_NO_DEVICE="${CI_CWUP_SKIP_NO_DEVICE:-1}"
          export CWUP_UART_PORT="${CI_UART_PORT:-/dev/ttyACM0}"
          export CWUP_EXPECT_WALLET_SEED="${CI_CWUP_EXPECT_WALLET_SEED:-1}"
          export CWUP_EXPECT_CRYPTO_SIGN="${CI_CWUP_EXPECT_CRYPTO_SIGN:-1}"
          echo "📡 test_cwup_mvp.py port=$CWUP_UART_PORT stress=${CI_CWUP_STRESS_ROUNDS} skip_no_device=$CWUP_SKIP_NO_DEVICE expect_seed=$CWUP_EXPECT_WALLET_SEED"
          "$PY" scripts/test_cwup_mvp.py \
            --port "${CWUP_UART_PORT}" \
            --bin build/cryptowallet.bin \
            --stress-extra-rounds "${CI_CWUP_STRESS_ROUNDS:-10}" \
            --ready-timeout "${CI_CWUP_READY_TIMEOUT_SEC:-60}"
          echo "✅ CWUP AT HIL OK"
