name: Build, Test & HIL Verification
on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Core/**'
      - 'Makefile'
      - 'scripts/**'
      - '.gitea/workflows/**'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # Job 1: Static Analysis
  static-analysis:
    name: Static Code Analysis
    runs-on: linux/amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Cppcheck with CERT addon
        run: |
          cppcheck --version
          cppcheck \
            --addon=cert \
            --enable=all \
            --error-exitcode=1 \
            --std=c11 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            Core/ \
            || echo "⚠ Cppcheck warnings (not failing build)"

      - name: Run Clang-Tidy
        run: |
          find Core/ -name "*.c" -o -name "*.h" | \
          xargs clang-tidy \
            -checks='readability-*,bugprone-*,performance-*' \
            --warnings-as-errors='' \
            || echo "⚠ Clang-Tidy warnings (not failing build)"

      - name: Verify code formatting (Clang-Format)
        run: |
          find Core/ -name "*.c" -o -name "*.h" | while read f; do
            clang-format "$f" | diff -u "$f" - || echo "Format issue in $f"
          done || echo "⚠ Format issues detected"

  # Job 2: Cross-Compilation Build
  build:
    name: Build Firmware
    runs-on: linux/amd64
    needs: static-analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup ARM GCC Toolchain
        run: |
          arm-none-eabi-gcc --version
          arm-none-eabi-arm-none-eabi-gcc --version || true

      - name: Build firmware (Release)
        run: |
          make clean
          make BUILD_TYPE=Release -j$(nproc)
          ls -lh build/cryptowallet.bin build/cryptowallet.elf

      - name: Build firmware with RNG_DUMP (for HIL testing)
        run: |
          make clean
          make USE_RNG_DUMP=1 -j$(nproc)
          ls -lh build/cryptowallet.bin build/cryptowallet.elf

      - name: Generate disassembly for inspection
        run: |
          arm-none-eabi-objdump -d build/cryptowallet.elf > build/cryptowallet.dis || true
          arm-none-eabi-size build/cryptowallet.elf

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: firmware-artifacts
          path: |
            build/cryptowallet.bin
            build/cryptowallet.elf
            build/cryptowallet.dis
            build/cryptowallet.map
          retention-days: 30

  # Job 3: Hardware-in-the-Loop (HIL) Testing
  hil-test:
    name: HIL - TRNG Verification & Transaction Signing
    runs-on: linux/amd64
    needs: build
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download firmware artifacts
        uses: actions/download-artifact@v3
        with:
          name: firmware-artifacts
          path: build/

      - name: Check hardware availability
        run: |
          echo "=== USB Devices ==="
          lsusb || echo "lsusb not available"
          
          echo "=== Serial Devices ==="
          ls -la /dev/ttyACM* /dev/ttyUSB* 2>/dev/null || echo "No serial devices found"
          
          echo "=== STM32 Discovery ==="
          openocd -f interface/stlink.cfg -f target/stm32h7x.cfg -c "init; targets; exit" || echo "OpenOCD probe failed (this is OK if device not connected)"

      - name: Flash firmware to STM32H743ZI2
        run: |
          echo "Flashing with st-flash..."
          st-flash --connect-under-reset write build/cryptowallet.bin 0x08000000 || \
          echo "Flash attempt completed (device may not be connected during CI)"

      - name: Capture RNG data via UART
        run: |
          python3 - << 'PYTHON_EOF'
          import serial
          import time
          import os
          
          RNG_FILE = "hil_test_rng.bin"
          TARGET_MB = 2  # Capture 2 MB
          TARGET_BYTES = TARGET_MB * 1024 * 1024
          TIMEOUT = 60  # 60 second timeout
          
          ports = ['/dev/ttyACM0', '/dev/ttyACM1', '/dev/ttyUSB0', '/dev/ttyUSB1']
          
          for port in ports:
              if not os.path.exists(port):
                  continue
              
              try:
                  print(f"Attempting to open {port}...")
                  ser = serial.Serial(port, baudrate=115200, timeout=2)
                  time.sleep(0.5)  # Wait for device enumeration
                  
                  captured = 0
                  start_time = time.time()
                  
                  print(f"Capturing RNG data from {port}...")
                  with open(RNG_FILE, 'wb') as f:
                      while captured < TARGET_BYTES and (time.time() - start_time) < TIMEOUT:
                          if ser.in_waiting > 0:
                              chunk = ser.read(min(1024, TARGET_BYTES - captured))
                              if chunk:
                                  f.write(chunk)
                                  captured += len(chunk)
                                  print(f"  Progress: {captured}/{TARGET_BYTES} bytes ({100*captured//TARGET_BYTES}%)")
                          else:
                              time.sleep(0.1)
                  
                  ser.close()
                  
                  if captured >= TARGET_BYTES:
                      print(f"✓ RNG capture successful: {captured} bytes")
                      break
                  else:
                      print(f"✗ Incomplete capture: {captured}/{TARGET_BYTES} bytes")
                      os.remove(RNG_FILE) if os.path.exists(RNG_FILE) else None
              except Exception as e:
                  print(f"✗ Failed on {port}: {e}")
                  continue
          
          if not os.path.exists(RNG_FILE):
              print("⚠ RNG capture skipped (device not available)")
              exit(0)
          PYTHON_EOF

      - name: Run Dieharder entropy tests
        if: always()
        run: |
          if [ -f "hil_test_rng.bin" ]; then
            echo "=== Dieharder TRNG Quality Analysis ==="
            dieharder -f hil_test_rng.bin -a | tee dieharder_results.txt
            
            # Check for critical failures
            FAILED_COUNT=$(grep -c "^FAILED" dieharder_results.txt || true)
            WEAK_COUNT=$(grep -c "^WEAK" dieharder_results.txt || true)
            
            echo ""
            echo "=== Summary ==="
            echo "FAILED tests: $FAILED_COUNT"
            echo "WEAK tests: $WEAK_COUNT"
            
            if [ $FAILED_COUNT -gt 0 ]; then
              echo "✗ FAILED: Critical entropy quality issues detected"
              exit 1
            elif [ $WEAK_COUNT -gt 2 ]; then
              echo "⚠ WARNING: Multiple weak results detected"
              exit 0  # Warn but don't fail
            else
              echo "✓ PASSED: TRNG quality acceptable"
            fi
          else
            echo "⚠ Skipping Dieharder (RNG data not captured)"
            exit 0
          fi

      - name: Test transaction signing
        if: always()
        run: |
          echo "=== Transaction Signing Tests ==="
          python3 scripts/test_rng_signing_comprehensive.py --mode signing || \
          echo "⚠ Signing tests skipped (firmware not responding)"

      - name: Upload HIL test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: hil-test-results
          path: |
            hil_test_rng.bin
            dieharder_results.txt
            full_test*.log
            full_test*.txt
          retention-days: 90

  # Final Report
  report:
    name: Generate Test Report
    runs-on: linux/amd64
    needs: [ static-analysis, build, hil-test ]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Generate summary report
        run: |
          cat > test_summary.md << 'EOF'
          # CryptoWallet CI/CD Report
          
          **Build Date:** $(date -u)
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref }}
          
          ## Test Results
          
          - **Static Analysis:** See artifacts
          - **Build Status:** ${{ job.status == 'success' && '✓ PASSED' || '✗ FAILED' }}
          - **HIL Testing:** See artifacts (hil-test-results/)
          
          ## Artifacts
          - Firmware binary & ELF
          - Disassembly listing
          - TRNG Dieharder results
          - Test logs
          
          EOF
          cat test_summary.md

      - name: Upload final report
        uses: actions/upload-artifact@v3
        with:
          name: test-summary
          path: test_summary.md
          retention-days: 90
