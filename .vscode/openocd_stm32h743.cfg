# OpenOCD Configuration for STM32H743ZI2 on Nucleo-144

# Interface: ST-LINK v2-1 (on board)
interface stlink
# OR for external ST-LINK: interface/stlink-v2-1.cfg

# Transport layer
transport select hla_swd

# STM32H743 target configuration
set CHIPNAME STM32H743ZI
set CPUTAPID 0x5ba02477

# Enable JTAG/SWD
source [find target/stm32h7x.cfg]

# Reset strategies
reset_config srst_open_drain connect_assert_srst

# Debugging options
set ALLOW_RESTORE 1
set WORKAREASIZE 0x10000

# Flash programming parameters
flash protect_check 0
# STM32H743 has 2MB internal flash (256KB sectors)

# Optional: Fast debugging with lower frequency
adapter speed 4000  ; kHz

# Breakpoint strategy
gdb_breakpoint_override hard

# Connection behavior
set DEFAULT_TARGET_TYPE cortex_m

# Telnet and GDB server configuration
telnet_port 4444
gdb_port 3333
tcl_port 6666

# Initial setup
$_TARGETNAME configure -event gdb-attach {
    echo "Debugger attached"
    halt
    sleep 100
}

$_TARGETNAME configure -event gdb-detach {
    echo "Debugger detached"
    # Optional: soft reset on detach
    # soft_reset_halt
}

# Optional: Flash programming helpers
proc flash_device {} {
    flash protect 0 0 last off
    program {*}
    verify_image {*}
    flash protect 0 0 last on
}

proc erase_device {} {
    flash erase_sector 0 0 last
}
