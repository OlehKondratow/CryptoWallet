# MkDocs - modern docs, Markdown-native
# Install: pip install mkdocs mkdocs-material
# Build: mkdocs build  or  make docs

site_name: CryptoWallet
site_description: FreeRTOS firmware for Secure Crypto Wallet on STM32H743ZI2
repo_url: https://github.com/your-org/CryptoWallet
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition

docs_dir: docs_src
site_dir: docs

nav:
  - Home: README.md
  - Build: build.md
  - API: api.md
  - Pinout: pinout.md
  - Architecture: architecture.md
  - trezor-crypto: trezor-crypto-integration.md
