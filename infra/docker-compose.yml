version: '3.8'

services:
  # Gitea Git Service
  gitea:
    image: docker.io/gitea/gitea:latest
    container_name: cryptowallet-gitea
    restart: unless-stopped
    networks:
      - dev-network
    volumes:
      # Database and configs - persistent bind mount on host
      - /data/gitea/data:/data
      # Git repositories - persistent bind mount on host
      - /data/gitea/repositories:/data/git/repositories
      # Timezone
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"   # Web UI
      - "2222:22"     # SSH Git access
    environment:
      - DB_TYPE=sqlite3
      - DB_PATH=/data/gitea/gitea.db
      - GITEA__DATABASE__LOG_SQL=false
      - GITEA__SECURITY__INSTALL_LOCK=true
      - GITEA__SERVICE__DISABLE_REGISTRATION=false
      - GITEA__RUN_MODE=prod
      - GITEA__SERVER__DOMAIN=localhost
      - GITEA__SERVER__ROOT_URL=http://localhost:3000/
      - GITEA__SERVER__SSH_PORT=2222
      - ROOT_URL=http://localhost:3000/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # NOTE: Act Runner is now installed on the host (~/gitea-runner)
  # Run via systemd service: systemctl --user status gitea-runner
  # This provides direct hardware access to UART, USB devices, and ST-LINK

  # Optional: PostgreSQL for Gitea (more reliable than SQLite)
  # Uncomment to use PostgreSQL instead of SQLite
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: cryptowallet-postgres
  #   restart: unless-stopped
  #   networks:
  #     - dev-network
  #   environment:
  #     - POSTGRES_DB=gitea
  #     - POSTGRES_USER=gitea
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_change_me}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U gitea"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

networks:
  dev-network:
    driver: bridge

volumes:
