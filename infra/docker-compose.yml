version: '3.8'

# Gitea с фиксированным IP в LAN: 192.168.127.5/23, шлюз 192.168.126.1
# ---------------------------------------------------------------------------
# Используется driver: macvlan — контейнер «сидит» в той же подсети, что и ПК.
# Родитель macvlan — интерфейс в 192.168.126.0/23. На этом хосте: eno1 (= altname enp0s31f6),
# адрес хоста 192.168.126.3/23. По умолчанию parent=eno1; при необходимости:
#   export GITEA_MACVLAN_PARENT=enp0s31f6
#   podman-compose -f infra/docker-compose.yml up -d
#
# Убедитесь, что 192.168.127.5 свободен. На rootless Podman macvlan может быть ограничен.
#
# Веб: Gitea слушает HTTP :3000; проброс ports → единственный стабильный URL с этого
# хоста: http://127.0.0.1:3000/ (репо: …/admin/CryptoWallet). В infra/.env держите
# GITEA_ROOT_URL=http://127.0.0.1:3000/ чтобы ссылки клонирования не уводили на LAN-IP.
#
# Доступ с ЭТОГО ЖЕ хоста по http://192.168.127.5:3000/ — у macvlan по умолчанию
# не работает; поднимите shim:  sudo ./infra/macvlan-host-shim.sh add
# затем в infra/.env: GITEA_ROOT_URL=http://192.168.127.5:3000/ и GITEA_SERVER_DOMAIN=192.168.127.5
#
# Без shim: используйте http://127.0.0.1:3000/ (GITEA_ROOT_URL по умолчанию в compose).
#
# HTTPS на 443 — только за reverse proxy. Репозиторий admin/CryptoWallet в UI:
#   http://…:3000/admin/CryptoWallet  (пользователь admin, репо CryptoWallet)
# Панель администрирования сайта: http://…:3000/admin

services:
  gitea:
    image: docker.io/gitea/gitea:latest
    container_name: cryptowallet-gitea
    restart: unless-stopped
    networks:
      gitea_lan:
        ipv4_address: 192.168.127.5
    volumes:
      - /data/gitea/data:/data
      - /data/gitea/repositories:/data/git/repositories
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    # Проброс на хост, чтобы с ЭТОЙ же машины открыть http://127.0.0.1:3000 (macvlan).
    ports:
      - "3000:3000"
    # Опционально SSH clone с хоста: ssh://git@127.0.0.1:2222 — раскомментируйте и
    # выставьте GITEA__SERVER__SSH_PORT=2222 в environment, если 22 занят на хосте.
    #   - "2222:22"
    environment:
      - DB_TYPE=sqlite3
      - DB_PATH=/data/gitea/gitea.db
      - GITEA__DATABASE__LOG_SQL=false
      - GITEA__SECURITY__INSTALL_LOCK=true
      - GITEA__SERVICE__DISABLE_REGISTRATION=false
      - GITEA__RUN_MODE=prod
      # Домен в ссылках (SSH и т.д.); вместе с GITEA_ROOT_URL — из .env или значения по умолчанию
      - GITEA__SERVER__DOMAIN=${GITEA_SERVER_DOMAIN:-127.0.0.1}
      - GITEA__SERVER__ROOT_URL=${GITEA_ROOT_URL:-http://127.0.0.1:3000/}
      - GITEA__SERVER__SSH_PORT=22
      - GITEA__SERVER__HTTP_PORT=3000
      - ROOT_URL=${GITEA_ROOT_URL:-http://127.0.0.1:3000/}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # NOTE: Act Runner — на хосте (systemd/podman), не в compose.
  #
  # act_runner на ЭТОМ же хосте: в ~/gitea-runner/.runner "address" = тот же хост, что и
  # GITEA_ROOT_URL (по умолчанию http://127.0.0.1:3000). Затем:
  #   systemctl --user restart gitea-runner
  # Новый registration token: ./infra/reregister-act-runner.sh (токен в infra/.env.local)

networks:
  gitea_lan:
    driver: macvlan
    driver_opts:
      # eno1 / enp0s31f6 — один и тот же NIC на ws8
      parent: ${GITEA_MACVLAN_PARENT:-eno1}
    ipam:
      config:
        - subnet: 192.168.126.0/23
          gateway: 192.168.126.1
