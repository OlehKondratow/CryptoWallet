version: '3.8'

# Gitea с фиксированным IP в LAN: 192.168.127.5/23, шлюз 192.168.126.1
# ---------------------------------------------------------------------------
# Используется driver: macvlan — контейнер «сидит» в той же подсети, что и ПК.
# Родитель macvlan — интерфейс в 192.168.126.0/23. На этом хосте: eno1 (= altname enp0s31f6),
# адрес хоста 192.168.126.3/23. По умолчанию parent=eno1; при необходимости:
#   export GITEA_MACVLAN_PARENT=enp0s31f6
#   podman-compose -f infra/docker-compose.yml up -d
#
# Убедитесь, что 192.168.127.5 свободен. На rootless Podman macvlan может быть ограничен.
#
# Публичный URL (HTTPS): https://192.168.127.5/ — обычно за reverse proxy (443→3000).
# Прямой HTTP к контейнеру: http://192.168.127.5:3000  |  git+ssh: ssh://git@192.168.127.5:22

services:
  gitea:
    image: docker.io/gitea/gitea:latest
    container_name: cryptowallet-gitea
    restart: unless-stopped
    networks:
      gitea_lan:
        ipv4_address: 192.168.127.5
    volumes:
      - /data/gitea/data:/data
      - /data/gitea/repositories:/data/git/repositories
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    # При macvlan публикация портов на хост обычно не нужна — сервис слушает на IP контейнера.
    # Раскомментируйте, если нужен доступ к Gitea ещё и через localhost на машине с Docker:
    # ports:
    #   - "3000:3000"
    #   - "2222:22"
    environment:
      - DB_TYPE=sqlite3
      - DB_PATH=/data/gitea/gitea.db
      - GITEA__DATABASE__LOG_SQL=false
      - GITEA__SECURITY__INSTALL_LOCK=true
      - GITEA__SERVICE__DISABLE_REGISTRATION=false
      - GITEA__RUN_MODE=prod
      - GITEA__SERVER__DOMAIN=192.168.127.5
      # Внешний адрес для ссылок (HTTPS); контейнер слушает HTTP :3000 — TLS на прокси или в app.ini
      - GITEA__SERVER__ROOT_URL=https://192.168.127.5/
      - GITEA__SERVER__SSH_PORT=22
      - GITEA__SERVER__HTTP_PORT=3000
      - ROOT_URL=https://192.168.127.5/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # NOTE: Act Runner — на хосте (systemd), не в compose.

networks:
  gitea_lan:
    driver: macvlan
    driver_opts:
      # eno1 / enp0s31f6 — один и тот же NIC на ws8
      parent: ${GITEA_MACVLAN_PARENT:-eno1}
    ipam:
      config:
        - subnet: 192.168.126.0/23
          gateway: 192.168.126.1
