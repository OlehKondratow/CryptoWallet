version: '3.8'

# Gitea with fixed LAN IP: 192.168.127.5/23, gateway 192.168.126.1
# ---------------------------------------------------------------------------
# Uses macvlan driver - container is in the same subnet as host machine.
# macvlan parent is an interface in 192.168.126.0/23. On this host: eno1 (= altname enp0s31f6),
# host address is 192.168.126.3/23. Default parent=eno1; if needed:
#   export GITEA_MACVLAN_PARENT=enp0s31f6
#   podman-compose -f infra/docker-compose.yml up -d
#
# Ensure 192.168.127.5 is free. macvlan can be limited on rootless Podman.
#
# Web: Gitea listens on HTTP :3000; with port mapping, the only stable URL from this
# host is http://127.0.0.1:3000/ (repo: .../admin/CryptoWallet). Keep in infra/.env:
# GITEA_ROOT_URL=http://127.0.0.1:3000/ so clone links do not point to LAN IP.
#
# Access from this same host to http://192.168.127.5:3000/ usually does not work with
# macvlan by default; create shim: sudo ./infra/macvlan-host-shim.sh add
# then in infra/.env set: GITEA_ROOT_URL=http://192.168.127.5:3000/ and GITEA_SERVER_DOMAIN=192.168.127.5
#
# Without shim: use http://127.0.0.1:3000/ (default GITEA_ROOT_URL in compose).
#
# HTTPS on 443 is only via reverse proxy. Repository admin/CryptoWallet in UI:
#   http://...:3000/admin/CryptoWallet  (user admin, repo CryptoWallet)
# Site administration panel: http://...:3000/admin

services:
  gitea:
    image: docker.io/gitea/gitea:latest
    container_name: cryptowallet-gitea
    restart: unless-stopped
    networks:
      gitea_lan:
        ipv4_address: 192.168.127.5
    volumes:
      - /data/gitea/data:/data
      - /data/gitea/repositories:/data/git/repositories
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    # Host port mapping: HTTP + SSH (git remote ssh://git@127.0.0.1:2222/...)
    ports:
      - "3000:3000"
      - "2222:22"
    environment:
      - DB_TYPE=sqlite3
      - DB_PATH=/data/gitea/gitea.db
      - GITEA__DATABASE__LOG_SQL=false
      - GITEA__SECURITY__INSTALL_LOCK=true
      - GITEA__SERVICE__DISABLE_REGISTRATION=false
      - GITEA__RUN_MODE=prod
      # Domain in links (SSH, etc.); together with GITEA_ROOT_URL from .env or defaults
      - GITEA__SERVER__DOMAIN=${GITEA_SERVER_DOMAIN:-127.0.0.1}
      - GITEA__SERVER__ROOT_URL=${GITEA_ROOT_URL:-http://127.0.0.1:3000/}
      # Clone URL SSH port (host: 2222 -> container :22); different from host sshd :22
      - GITEA__SERVER__SSH_PORT=2222
      - GITEA__SERVER__HTTP_PORT=3000
      - ROOT_URL=${GITEA_ROOT_URL:-http://127.0.0.1:3000/}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # NOTE: Act Runner is on host (systemd/podman), not in compose.
  #
  # act_runner on this same host: in ~/gitea-runner/.runner "address" should match
  # GITEA_ROOT_URL host (default http://127.0.0.1:3000). Then:
  #   systemctl --user restart gitea-runner
  # New registration token flow: ./infra/reregister-act-runner.sh (token in infra/.env.local)

networks:
  gitea_lan:
    driver: macvlan
    driver_opts:
      # eno1 / enp0s31f6 - same NIC on ws8
      parent: ${GITEA_MACVLAN_PARENT:-eno1}
    ipam:
      config:
        - subnet: 192.168.126.0/23
          gateway: 192.168.126.1
