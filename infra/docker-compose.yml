version: '3.8'

# Gitea с фиксированным IP в LAN: 192.168.127.4/23, шлюз 192.168.126.1
# ---------------------------------------------------------------------------
# Используется driver: macvlan — контейнер «сидит» в той же подсети, что и ПК.
# Обязательно задайте интерфейс хоста, который смотрит в эту сеть:
#   export GITEA_MACVLAN_PARENT=enp0s31f6
#   podman-compose -f infra/docker-compose.yml up -d
# (имя смотрите: ip -br addr  |  nmcli device status)
#
# Убедитесь, что 192.168.127.4 свободен. На rootless Podman macvlan может быть ограничен.
#
# Доступ: http://192.168.127.4:3000  |  git+ssh: ssh://git@192.168.127.4:22
# Старый вариант с пробросом localhost:3000 при macvlan не используется — см. порт ниже.

services:
  gitea:
    image: docker.io/gitea/gitea:latest
    container_name: cryptowallet-gitea
    restart: unless-stopped
    networks:
      gitea_lan:
        ipv4_address: 192.168.127.4
    volumes:
      - /data/gitea/data:/data
      - /data/gitea/repositories:/data/git/repositories
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    # При macvlan публикация портов на хост обычно не нужна — сервис слушает на IP контейнера.
    # Раскомментируйте, если нужен доступ к Gitea ещё и через localhost на машине с Docker:
    # ports:
    #   - "3000:3000"
    #   - "2222:22"
    environment:
      - DB_TYPE=sqlite3
      - DB_PATH=/data/gitea/gitea.db
      - GITEA__DATABASE__LOG_SQL=false
      - GITEA__SECURITY__INSTALL_LOCK=true
      - GITEA__SERVICE__DISABLE_REGISTRATION=false
      - GITEA__RUN_MODE=prod
      - GITEA__SERVER__DOMAIN=192.168.127.4
      - GITEA__SERVER__ROOT_URL=http://192.168.127.4:3000/
      - GITEA__SERVER__SSH_PORT=22
      - GITEA__SERVER__HTTP_PORT=3000
      - ROOT_URL=http://192.168.127.4:3000/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # NOTE: Act Runner — на хосте (systemd), не в compose.

networks:
  gitea_lan:
    driver: macvlan
    driver_opts:
      # Физический интерфейс с адресом в 192.168.126.0/23 (замените на свой)
      parent: ${GITEA_MACVLAN_PARENT:-eth0}
    ipam:
      config:
        - subnet: 192.168.126.0/23
          gateway: 192.168.126.1
